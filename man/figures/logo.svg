<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 231" width="200" height="231">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ec9e1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#29a8c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d8ba3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="100,4 196,54 196,177 100,227 4,177 4,54"/>
    </clipPath>
  </defs>

  <!-- Hex border / shadow -->
  <polygon points="100,2 198,53 198,179 100,229 2,179 2,53"
           fill="#0a1e30" opacity="0.5"/>

  <!-- Main hex fill -->
  <polygon points="100,4 196,54 196,177 100,227 4,177 4,54"
           fill="url(#hexGrad)"/>

  <!-- Hex border highlight -->
  <polygon points="100,4 196,54 196,177 100,227 4,177 4,54"
           fill="none" stroke="#4ec9e1" stroke-width="3" opacity="0.8"/>

  <!-- ECG / heartbeat line in background -->
  <g clip-path="url(#hexClip)" opacity="0.12">
    <polyline points="0,115 30,115 38,115 44,85 50,145 56,95 62,115 90,115 200,115"
              fill="none" stroke="#4ec9e1" stroke-width="3"/>
  </g>

  <!-- Spine column — vertebrae stack -->
  <g transform="translate(100, 68)" filter="url(#glow)">
    <!-- Vertebra 1 -->
    <rect x="-14" y="0"  width="28" height="10" rx="3" fill="url(#spineGrad)"/>
    <rect x="-6"  y="10" width="12" height="5"  rx="1" fill="#29a8c4" opacity="0.7"/>
    <!-- Vertebra 2 -->
    <rect x="-14" y="15" width="28" height="10" rx="3" fill="url(#spineGrad)"/>
    <rect x="-6"  y="25" width="12" height="5"  rx="1" fill="#29a8c4" opacity="0.7"/>
    <!-- Vertebra 3 -->
    <rect x="-14" y="30" width="28" height="10" rx="3" fill="url(#spineGrad)"/>
    <rect x="-6"  y="40" width="12" height="5"  rx="1" fill="#29a8c4" opacity="0.7"/>
    <!-- Vertebra 4 -->
    <rect x="-14" y="45" width="28" height="10" rx="3" fill="url(#spineGrad)"/>
    <rect x="-6"  y="55" width="12" height="5"  rx="1" fill="#29a8c4" opacity="0.7"/>
    <!-- Vertebra 5 -->
    <rect x="-14" y="60" width="28" height="10" rx="3" fill="url(#spineGrad)"/>

    <!-- Side nerves left -->
    <line x1="-14" y1="5"  x2="-28" y2="2"  stroke="#4ec9e1" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="20" x2="-30" y2="18" stroke="#4ec9e1" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="35" x2="-30" y2="34" stroke="#4ec9e1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-14" y1="50" x2="-28" y2="50" stroke="#4ec9e1" stroke-width="1.5" opacity="0.5"/>
    <line x1="-14" y1="65" x2="-26" y2="66" stroke="#4ec9e1" stroke-width="1.5" opacity="0.4"/>

    <!-- Side nerves right -->
    <line x1="14" y1="5"  x2="28" y2="2"  stroke="#4ec9e1" stroke-width="1.5" opacity="0.7"/>
    <line x1="14" y1="20" x2="30" y2="18" stroke="#4ec9e1" stroke-width="1.5" opacity="0.7"/>
    <line x1="14" y1="35" x2="30" y2="34" stroke="#4ec9e1" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="50" x2="28" y2="50" stroke="#4ec9e1" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="65" x2="26" y2="66" stroke="#4ec9e1" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Package name -->
  <text x="100" y="162"
        font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-size="22" font-weight="700" font-style="italic"
        text-anchor="middle" fill="#ffffff" letter-spacing="1">
    sci_ehr
  </text>

  <!-- Tagline -->
  <text x="100" y="178"
        font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-size="7.5" font-weight="400"
        text-anchor="middle" fill="#7dd4e8" letter-spacing="0.5" opacity="0.9">
    ICU EHR · SCI Research
  </text>

  <!-- Bottom hex accent dots -->
  <circle cx="72"  cy="208" r="2.5" fill="#4ec9e1" opacity="0.6"/>
  <circle cx="100" cy="214" r="2.5" fill="#4ec9e1" opacity="0.6"/>
  <circle cx="128" cy="208" r="2.5" fill="#4ec9e1" opacity="0.6"/>
</svg>
